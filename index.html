<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>💗</title>
  <style>
    :root{
      --bg0:#ffffff;
      --bg1:#fff5fb;

      --card:#ffffff;
      --card2:#fffafd;
      --stroke:#ffd6ec;

      --text:#3a2a33;
      --muted:#8f6f7f;

      --pink:#ff4da6;
      --pink2:#ff85c8;
      --rose:#ffc2e6;
      --soft:#ffe6f4;

      --gold:#ffd36a;

      --shadow: 0 20px 60px rgba(255, 105, 180, .15);
      --r: 22px;

      --ease: cubic-bezier(.2,.9,.2,1);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 18% 8%, #ffe6f4, transparent 60%),
        radial-gradient(900px 600px at 85% 92%, #ffd6ec, transparent 60%),
        linear-gradient(180deg, #ffffff, #fff5fb);
      overflow-x:hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .ambient{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; opacity:.35}
    .ambient i{
      position:absolute; font-style:normal;
      animation: drift linear infinite;
      opacity:.28;
      color: rgba(255, 77, 166, .35);
      filter: blur(.1px);
    }
    @keyframes drift{
      0%{ transform: translateY(110vh) translateX(0) scale(.9); opacity:0;}
      12%{opacity:.28}
      100%{ transform: translateY(-20vh) translateX(60px) scale(1.15); opacity:0;}
    }

    .wrap{position:relative; z-index:1; min-height:100%; display:grid; place-items:center; padding:18px 12px 40px;}

    .shell{
      width:min(1080px, 100%);
      border-radius: var(--r);
      background:#ffffff;
      border:1px solid #ffd6ec;
      box-shadow: var(--shadow);
      overflow:hidden;
      transform: translateZ(0);
    }

    .top{
      padding:14px 16px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      border-bottom:1px solid #ffe1f1;
      background:
        radial-gradient(900px 260px at 18% 0%, rgba(255,77,166,.12), transparent 62%),
        #ffffff;
    }

    .badge{
      display:inline-flex; align-items:center; gap:10px;
      padding:9px 12px;
      border-radius:999px;
      border:1px solid #ffd6ec;
      background: #fff7fc;
      color: #8f6f7f;
      font-size:13px;
      letter-spacing:.2px;
      white-space:nowrap;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background: linear-gradient(135deg, var(--pink), var(--pink2));
      box-shadow: 0 0 18px rgba(255,77,166,.25);
    }
    .who{line-height:1.1; text-align:right}
    .who .small{font-size:12px;color:var(--muted)}
    .who .big{font-size:15px;font-weight:900; color:#3a2a33}

    .content{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:14px;
      padding:14px;
    }
    @media (max-width:900px){
      .content{grid-template-columns:1fr}
      .who{text-align:left}
    }

    .panel{
      border-radius:20px;
      border:1px solid #ffe1f1;
      background: #ffffff;
      padding:14px;
      box-shadow: 0 10px 30px rgba(255, 105, 180, .08);
    }

    h1{margin:0 0 8px; font-size: clamp(24px, 3.0vw, 40px); letter-spacing:-.7px}
    h2{margin:0 0 10px; font-size:20px}
    .sub{margin:0 0 12px; color:var(--muted); font-size:14px; line-height:1.65}
    .mini{font-size:12px;color:var(--muted)}

    .spark{
      background: linear-gradient(90deg, #ff4da6, #ff85c8);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      font-weight:900;
    }

    .progressRow{display:flex; gap:10px; align-items:center; margin-top:10px}
    .bar{
      flex:1; height:10px; border-radius:999px;
      background: #ffe6f4;
      border:1px solid #ffd6ec;
      overflow:hidden;
    }
    .fill{
      height:100%; width:0%;
      border-radius:999px;
      background: linear-gradient(90deg, var(--pink), var(--pink2));
      transition: width .35s var(--ease);
      box-shadow: 0 0 18px rgba(255,77,166,.18);
    }
    .pct{min-width:58px; text-align:right; font-size:12px; color:var(--muted)}

    .step{display:none; animation: in .28s var(--ease) both}
    .step.show{display:block}
    @keyframes in{from{opacity:0; transform: translateY(10px)} to{opacity:1; transform: translateY(0)}}

    .btns{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:10px}
    button{
      border:none; cursor:pointer;
      padding:12px 16px; border-radius:16px;
      font-weight:950; font-size:14px; letter-spacing:.2px;
      transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
      user-select:none;
      touch-action: manipulation;
    }
    button:active{transform: translateY(1px) scale(.99)}
    button:disabled{opacity:.55; cursor:not-allowed}

    .primary{
      background: linear-gradient(135deg, #ff4da6, #ff85c8);
      color:#ffffff;
      box-shadow: 0 10px 30px rgba(255, 105, 180, .25);
    }
    .primary:hover{filter:brightness(1.03)}
    .ghost{
      background: #fff7fc;
      color: #3a2a33;
      border:1px solid #ffd6ec;
      box-shadow: 0 10px 24px rgba(255, 105, 180, .10);
    }
    .ghost:hover{filter:brightness(1.02)}
    .danger{
      background: #ffffff;
      color: #8f6f7f;
      border:1px solid #ffd6ec;
    }

    .quote{
      margin-top:10px;
      padding:12px;
      border-radius:18px;
      border:1px dashed #ffd6ec;
      background: #fffafd;
      color: #6f5160;
      font-size:13px;
      line-height:1.65;
      white-space:pre-wrap;
    }

    .grid{display:grid; grid-template-columns: 1fr 1fr; gap:10px}
    @media (max-width:520px){.grid{grid-template-columns:1fr}}
    .stat{
      padding:12px;
      border-radius:18px;
      border:1px solid #ffe1f1;
      background: #ffffff;
      box-shadow: 0 8px 20px rgba(255, 105, 180, .08);
    }
    .stat .k{font-size:12px;color:var(--muted); margin-bottom:6px}
    .stat .v{font-size:18px;font-weight:950}

    .pWrap{
      margin-top:10px;
      border-radius:18px;
      border:1px solid #ffe1f1;
      background: #fffafd;
      padding:12px;
    }
    .pGrid{
      margin-top:10px;
      display:grid;
      grid-template-columns: 1fr 220px;
      gap:12px;
      align-items:start;
    }
    @media (max-width:740px){ .pGrid{grid-template-columns:1fr;} }

    .puzzle{
      width:100%;
      max-width:520px;
      aspect-ratio: 1 / 1;
      border-radius:18px;
      border:1px solid #ffd6ec;
      background: #ffe6f4;
      position:relative;
      overflow:hidden;
      user-select:none;
      touch-action:none;
    }
    .pieceBtn{
      position:absolute;
      border-radius:14px;
      border:1px solid rgba(255, 214, 236, .9);
      background-repeat:no-repeat;
      cursor:pointer;
      box-shadow: 0 10px 24px rgba(255, 105, 180, .14);
      transition: transform .08s ease, box-shadow .2s ease;
      will-change: transform;
    }
    .pieceBtn:active{transform: scale(.98)}

    .pInfo{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:10px}
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid #ffd6ec;
      background:#fff7fc;
      color:#6f5160;
      font-size:12px;
      font-weight:800;
    }

    .previewCard{
      border-radius:18px;
      border:1px solid #ffe1f1;
      background:#ffffff;
      box-shadow: 0 8px 20px rgba(255, 105, 180, .08);
      overflow:hidden;
    }
    .previewTop{
      padding:10px 12px;
      border-bottom:1px solid #ffe1f1;
      background: #fff7fc;
      font-weight:900;
      font-size:12px;
      color:#6f5160;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }
    .previewImgWrap{ padding:10px; background: #fffafd; }
    .previewImg{
      width:100%;
      border-radius:14px;
      border:1px solid #ffd6ec;
      display:block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }
    .tinyBtn{
      padding:8px 10px;
      border-radius:12px;
      font-size:12px;
      font-weight:950;
    }

    .memoryGrid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      margin-top:10px;
    }
    @media (max-width:560px){ .memoryGrid{grid-template-columns: repeat(3, 1fr);} }
    .cardBtn{
      height:76px;
      border-radius:18px;
      border:1px solid #ffd6ec;
      background:#ffffff;
      box-shadow: 0 10px 22px rgba(255,105,180,.10);
      font-size:26px;
      display:grid;
      place-items:center;
      transition: transform .12s ease, filter .12s ease;
    }
    .cardBtn:active{transform: scale(.98)}
    .cardBtn.revealed{ background:#fff7fc }
    .cardBtn.matched{
      background: linear-gradient(135deg, rgba(255,77,166,.12), rgba(255,133,200,.12));
      border-color:#ffc2e6;
    }

    .catchBox{
      position:relative;
      height:260px;
      border-radius:18px;
      border:1px solid #ffd6ec;
      background: radial-gradient(300px 180px at 20% 30%, rgba(255,77,166,.14), transparent 60%), #fffafd;
      overflow:hidden;
      margin-top:10px;
    }
    .heart{
      position:absolute;
      font-size:26px;
      cursor:pointer;
      user-select:none;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 10px 14px rgba(255,105,180,.18));
      animation: floatUp linear forwards;
    }
    @keyframes floatUp{
      from{opacity:0; transform: translate(-50%, 20px) scale(.9)}
      10%{opacity:1}
      to{opacity:0; transform: translate(-50%, -240px) scale(1.15)}
    }

    .modal{
      position:fixed; inset:0;
      display:none; place-items:center;
      padding:16px;
      background: rgba(0,0,0,.35);
      z-index:10;
    }
    .modal.show{display:grid}
    .modalCard{
      width:min(720px, 100%);
      border-radius:24px;
      background: #ffffff;
      border:1px solid #ffd6ec;
      box-shadow: 0 26px 90px rgba(255, 105, 180, .22);
      padding:16px;
    }
    .modalCard h3{margin:0 0 8px; font-size:22px}
    .modalCard p{margin:0 0 12px; color:#6f5160; line-height:1.65; font-size:14px; white-space:pre-wrap}
    .input{
      width:100%;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid #ffd6ec;
      background: #fffafd;
      color: #3a2a33;
      outline:none;
      font-size:14px;
    }

    .confetti{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:9; display:none}
    .confetti.show{display:block}
    .piece{position:absolute; width:10px; height:16px; opacity:.95; border-radius:3px; animation: fall linear forwards}
    @keyframes fall{from{transform: translateY(-10vh) rotate(0deg)} to{transform: translateY(110vh) rotate(760deg)}}

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform: translateX(-50%);
      width:min(520px, calc(100% - 24px));
      z-index:11;
      display:none;
    }
    .toast.show{display:block; animation: toastIn .22s var(--ease) both}
    @keyframes toastIn{
      from{opacity:0; transform: translateX(-50%) translateY(10px)}
      to{opacity:1; transform: translateX(-50%) translateY(0)}
    }
    .toastCard{
      border-radius:22px;
      border:1px solid #ffd6ec;
      background:#ffffff;
      box-shadow: 0 26px 90px rgba(255, 105, 180, .18);
      padding:12px;
      overflow:hidden;
    }
    .toastTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding-bottom:10px;
      border-bottom:1px solid #ffe1f1;
    }
    .toastTitle{font-weight:950; letter-spacing:-.2px;}
    .toastBody{
      padding-top:10px;
      color:#6f5160;
      line-height:1.6;
      font-size:14px;
      white-space:pre-wrap;
    }

    .footer{
      padding:12px 16px 16px;
      border-top:1px solid #ffe1f1;
      display:flex; justify-content:space-between; align-items:center;
      gap:10px; flex-wrap:wrap;
      color:var(--muted); font-size:13px;
      background:#ffffff;
    }

    #audio { display:none; }

    .presenter{
      position:fixed; inset:0;
      background:
        radial-gradient(900px 600px at 20% 12%, rgba(255,77,166,.22), transparent 60%),
        radial-gradient(900px 600px at 85% 85%, rgba(255,133,200,.18), transparent 60%),
        linear-gradient(180deg, #ffffff, #fff5fb);
      z-index:20;
      display:none;
      overflow:hidden;
    }
    .presenter.show{display:block}
    .pWrap2{
      position:relative;
      height:100%;
      display:grid;
      place-items:center;
      padding:18px 14px;
    }
    .pCard{
      width:min(820px, calc(100% - 12px));
      border-radius:28px;
      border:1px solid #ffd6ec;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      box-shadow: 0 26px 90px rgba(255, 105, 180, .16);
      padding:18px;
      overflow:hidden;
      transform: translateZ(0);
    }
    .pTopRow{
      display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
      margin-bottom:12px;
    }
    .pPill{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid #ffd6ec;
      background:#fff7fc;
      color:#6f5160;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .pTitle{
      margin:0;
      font-size: clamp(22px, 3.2vw, 38px);
      letter-spacing:-.6px;
      line-height:1.15;
    }
    .pBody{
      margin-top:12px;
      border-radius:22px;
      border:1px dashed #ffd6ec;
      background:#fffafd;
      padding:14px;
      color:#6f5160;
      font-size: clamp(14px, 2.6vw, 18px);
      line-height:1.75;
      white-space:pre-wrap;
      min-height: 160px;
    }
    .pControls{
      display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap; margin-top:12px;
    }

    .heartsFx{
      position:absolute; inset:0; pointer-events:none;
      overflow:hidden;
    }
    .hx{
      position:absolute;
      font-size:22px;
      opacity:0;
      filter: drop-shadow(0 18px 20px rgba(255,105,180,.16));
      animation: hxUp linear forwards;
      will-change: transform, opacity;
    }
    @keyframes hxUp{
      0%{transform: translateY(40px) scale(.9) rotate(-10deg); opacity:0}
      12%{opacity:.9}
      100%{transform: translateY(-120vh) scale(1.25) rotate(18deg); opacity:0}
    }

    .wipe{
      position:absolute; inset:-30%;
      background: radial-gradient(closest-side, rgba(255,77,166,.26), transparent 70%);
      transform: translateX(-120%) rotate(8deg);
      opacity:0;
      pointer-events:none;
    }
    .wipe.run{
      opacity:1;
      animation: wipe 850ms var(--ease) both;
    }
    @keyframes wipe{
      0%{transform: translateX(-120%) rotate(8deg); opacity:0}
      18%{opacity:1}
      100%{transform: translateX(120%) rotate(8deg); opacity:0}
    }

    .typeCursor::after{
      content:"";
      display:inline-block;
      width:10px; height:1.1em;
      margin-left:4px;
      border-radius:2px;
      background: rgba(255,77,166,.55);
      animation: blink 1s steps(1) infinite;
      vertical-align:-2px;
    }
    @keyframes blink{50%{opacity:0}}

    @media (prefers-reduced-motion: reduce){
      *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; scroll-behavior:auto !important;}
    }

    @media (max-width:520px){
      .panel{padding:12px}
      .cardBtn{height:70px}
      .catchBox{height:240px}
      .pCard{padding:14px}
      .pBody{min-height: 140px}
    }
  </style>
</head>

<body>
  <div class="ambient" id="ambient" aria-hidden="true"></div>
  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <audio id="audio" preload="auto">
    <source src="cancion.mp3" type="audio/mpeg" />
  </audio>

  <main class="wrap">
    <section class="shell">
      <header class="top">
        <div class="badge"><span class="dot"></span><span id="badgeText">💗</span></div>
        <div class="who">
          <div class="small">Para:</div>
          <div class="big" id="toName">—</div>
        </div>
      </header>

      <div class="content">
        <section class="panel">
          <h1>Hola <span class="spark" id="helloName">💗</span></h1>
          <p class="sub" id="introText">—</p>

          <div class="progressRow">
            <div class="bar"><div class="fill" id="fill"></div></div>
            <div class="pct" id="pct">0%</div>
          </div>

          <!-- STEPS (mantengo lo mismo, ya profesional) -->
          <div class="step show" id="s1">
            <h2 style="margin-top:14px">🧩</h2>
            <div class="pWrap">
              <div class="pGrid">
                <div>
                  <div class="puzzle" id="puzzle" aria-label="Rompecabezas"></div>
                  <div class="pInfo">
                    <span class="pill">✨ <span id="moves">0</span></span>
                    <span class="pill">♡ <span id="pState">—</span></span>
                  </div>
                  <div class="quote" id="pWarn" style="display:none">—</div>
                </div>

                <div class="previewCard">
                  <div class="previewTop">
                    <span>📷</span>
                    <button class="ghost tinyBtn" id="togglePreview" type="button">—</button>
                  </div>
                  <div class="previewImgWrap" id="previewBody">
                    <img class="previewImg" id="previewImg" alt="Foto" />
                  </div>
                </div>
              </div>

              <div class="btns">
                <button class="ghost" id="shuffle" type="button">↻</button>
                <button class="primary" id="go2" disabled type="button">Continuar</button>
              </div>
            </div>
          </div>

          <div class="step" id="s2">
            <h2 style="margin-top:14px">🃏</h2>
            <div class="grid">
              <div class="stat"><div class="k">♡</div><div class="v"><span id="mPairs">0</span>/<span id="mTotal">0</span></div></div>
              <div class="stat"><div class="k">✨</div><div class="v" id="mTries">0</div></div>
            </div>
            <div class="memoryGrid" id="memory"></div>
            <div class="btns">
              <button class="ghost" id="resetMemory" type="button">↻</button>
              <button class="primary" id="go3" disabled type="button">Continuar</button>
              <button class="ghost" id="back1" type="button">Volver</button>
            </div>
            <div class="quote" id="mMsg">💗</div>
          </div>

          <div class="step" id="s3">
            <h2 style="margin-top:14px">💘</h2>
            <div class="grid">
              <div class="stat"><div class="k">♡</div><div class="v"><span id="cScore">0</span>/10</div></div>
              <div class="stat"><div class="k">⏳</div><div class="v" id="cTime">—</div></div>
            </div>
            <div class="catchBox" id="catchBox" aria-label="Atrapa corazones"></div>
            <div class="btns">
              <button class="ghost" id="startCatch" type="button">▶</button>
              <button class="primary" id="go4" disabled type="button">Continuar</button>
              <button class="ghost" id="back2" type="button">Volver</button>
            </div>
            <div class="quote" id="cMsg">💗</div>
          </div>

          <div class="step" id="s4">
            <h2 style="margin-top:14px">✨</h2>
            <div class="grid">
              <div class="stat"><div class="k">—</div><div class="v" id="qd">0/3</div></div>
              <div class="stat"><div class="k">—</div><div class="v" id="qs">0</div></div>
            </div>

            <div class="pWrap">
              <div class="quote" id="q1"></div>
              <div class="btns" id="q1opts"></div>
              <div class="quote" id="q2" style="margin-top:10px"></div>
              <div class="btns" id="q2opts"></div>
              <div class="quote" id="q3" style="margin-top:10px"></div>
              <div class="btns" id="q3opts"></div>
            </div>

            <div class="btns">
              <button class="ghost" id="resetQuiz" type="button">↻</button>
              <button class="primary" id="go5" disabled type="button">Continuar</button>
              <button class="ghost" id="back3" type="button">Volver</button>
            </div>

            <div class="quote" id="quizMsg">💗</div>
          </div>

          <div class="step" id="s5">
            <h2 style="margin-top:14px">Gracias por jugar 💗</h2>
            <p class="sub" id="thanksText">—</p>
            <div class="btns">
              <button class="primary" id="finalContinue" type="button">Continuar</button>
              <button class="danger" id="restart" type="button">Reiniciar</button>
            </div>
          </div>
        </section>

        <aside class="panel">
          <h2 style="margin:0 0 10px">—</h2>
          <p class="sub" style="margin-top:0" id="sideText">—</p>

          <div class="grid">
            <div class="stat"><div class="k">Para</div><div class="v" id="toName2">—</div></div>
            <div class="stat"><div class="k">De</div><div class="v" id="fromName2">—</div></div>
            <div class="stat"><div class="k">—</div><div class="v" id="since">—</div></div>
            <div class="stat"><div class="k">—</div><div class="v" id="months2">—</div></div>
          </div>

          <div class="btns" style="margin-top:12px">
            <button class="ghost" id="jump1" type="button">1</button>
            <button class="ghost" id="jump2" type="button">2</button>
            <button class="ghost" id="jump3" type="button">3</button>
            <button class="ghost" id="jump4" type="button">4</button>
          </div>

          <div class="quote" style="margin-top:10px" id="smallNote">💗</div>
        </aside>
      </div>

      <footer class="footer">
        <div>Hecho por <strong id="fromName">—</strong></div>
        <div><strong id="status">—</strong></div>
      </footer>
    </section>
  </main>

  <!-- PIN -->
  <div class="modal" id="pinModal">
    <div class="modalCard">
      <h3 id="pinTitle">💗</h3>
      <p id="pinSub">—</p>
      <input class="input" id="pin" placeholder="PIN" inputmode="numeric" />
      <p class="mini" id="pinMsg" style="margin:8px 0 0"></p>
      <div class="btns" style="justify-content:flex-end">
        <button class="ghost" id="pinCancel" type="button">Cancelar</button>
        <button class="primary" id="pinUnlock" type="button">Desbloquear</button>
      </div>
    </div>
  </div>

  <!-- Presenter -->
  <section class="presenter" id="presenter" aria-hidden="true">
    <div class="heartsFx" id="heartsFx"></div>
    <div class="wipe" id="wipe"></div>
    <div class="pWrap2">
      <div class="pCard">
        <div class="pTopRow">
          <span class="pPill" id="pPillLeft">💗</span>
          <span class="pPill" id="pPillRight">—</span>
        </div>

        <h2 class="pTitle"><span class="spark" id="pHeadline">—</span></h2>
        <div class="pBody" id="pBody"></div>

        <div class="pControls">
          <button class="ghost" id="pPrev" type="button">◀</button>
          <button class="primary" id="pNext" type="button">▶</button>
          <button class="danger" id="pExit" type="button">Salir</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Toast proposal -->
  <div class="toast" id="toast">
    <div class="toastCard">
      <div class="toastTop">
        <div class="toastTitle" id="toastTitle">💗</div>
        <button class="ghost tinyBtn" id="toastClose" type="button">✕</button>
      </div>
      <div class="toastBody" id="toastBody">—</div>
      <div class="btns" style="margin-top:12px; justify-content:flex-end">
        <button class="ghost" id="btnNo" type="button">No</button>
        <button class="primary" id="btnYes" type="button">Sí</button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="modal" id="resultModal">
    <div class="modalCard">
      <h3 id="resTitle">—</h3>
      <p id="resBody">—</p>
      <div class="btns" style="justify-content:flex-end">
        <button class="primary" id="closeRes" type="button">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    const NOMBRE_DE_ELLA = "mi Emi Hermosa";
    const TU_NOMBRE      = "JOSE";
    const FECHA_CONOCIERON = "2025-07-30";
    const FOTO_PUZZLE = "foto.jpg";
    const PIN_REVELAR = "270607";

    const $ = (id)=>document.getElementById(id);

    $("toName").textContent = NOMBRE_DE_ELLA + " ✨";
    $("toName2").textContent = NOMBRE_DE_ELLA;
    $("fromName").textContent = TU_NOMBRE;
    $("fromName2").textContent = TU_NOMBRE;

    $("helloName").textContent = NOMBRE_DE_ELLA;
    $("badgeText").textContent = "💗";
    document.title = "💗";

    $("sideText").textContent  = " ";
    $("smallNote").textContent = " ";
    $("thanksText").textContent = " ";

    const frases = [
      "Me gustás de una forma que no sé explicar… pero se siente.",
      "Sos de esas personas que cambian el día con solo estar.",
      "Me gusta cuando te reís. Me gusta cuando estás cerca.",
      "Si te pudiera guardar en un lugar seguro… sería en mi pecho.",
      "Con vos, todo se siente más bonito."
    ];
    $("introText").textContent = frases[Math.floor(Math.random()*frases.length)];
    $("thanksText").textContent = frases[Math.floor(Math.random()*frases.length)];

    const previewImg = $("previewImg");
    previewImg.src = FOTO_PUZZLE;
    $("togglePreview").textContent = "—";
    $("togglePreview").addEventListener("click", ()=>{
      const body = $("previewBody");
      const hidden = body.style.display === "none";
      body.style.display = hidden ? "block" : "none";
      $("togglePreview").textContent = "—";
    });

    const ambient = $("ambient");
    const parts = ["•","·","✦","✧","⋆","⟡","♡"];
    function spawn(){
      const el = document.createElement("i");
      el.textContent = parts[Math.floor(Math.random()*parts.length)];
      el.style.left = (Math.random()*100) + "vw";
      el.style.fontSize = (12 + Math.random()*18) + "px";
      el.style.animationDuration = (7 + Math.random()*10) + "s";
      el.style.animationDelay = (Math.random()*1.5) + "s";
      ambient.appendChild(el);
      setTimeout(()=>el.remove(), 17000);
    }
    for(let i=0;i<18;i++) spawn();
    setInterval(spawn, 800);

    function daysBetweenISO(iso, now){
      const ms = 24*60*60*1000;
      const d0 = new Date(iso + "T00:00:00");
      const d1 = new Date(now);
      return Math.max(0, Math.floor((d1 - d0) / ms));
    }
    function approxMonthsFromDays(days){
      return Math.round(days / 30.44);
    }
    const days = daysBetweenISO(FECHA_CONOCIERON, new Date());
    const approxMonths = approxMonthsFromDays(days);
    $("since").textContent  = `${days.toLocaleString("es-GT")} días`;
    $("months2").textContent= `≈ ${approxMonths} meses`;

    const steps = ["s1","s2","s3","s4","s5"];
    function show(stepId){
      steps.forEach(s => $(s).classList.remove("show"));
      $(stepId).classList.add("show");
      const idx = steps.indexOf(stepId);
      const p = Math.round((idx/(steps.length-1))*100);
      $("fill").style.width = p + "%";
      $("pct").textContent = p + "%";
      $("status").textContent = " ";
    }
    show("s1");

    $("restart").addEventListener("click", ()=> location.reload());
    $("jump1").addEventListener("click", ()=> show("s1"));
    $("jump2").addEventListener("click", ()=> show("s2"));
    $("jump3").addEventListener("click", ()=> show("s3"));
    $("jump4").addEventListener("click", ()=> show("s4"));

    /* ===== PUZZLE ===== */
    const puzzleEl = $("puzzle");
    const size = 4;
    let order = [];
    let selected = null;
    let moves = 0;

    function isSolved(){
      for(let i=0;i<order.length;i++){
        if(order[i] !== i) return false;
      }
      return true;
    }

    function renderPuzzle(){
      puzzleEl.innerHTML = "";
      const W = puzzleEl.clientWidth;
      const H = puzzleEl.clientHeight;
      const pw = W / size;
      const ph = H / size;

      for(let pos=0; pos<size*size; pos++){
        const pieceIndex = order[pos];
        const r = Math.floor(pos / size);
        const c = pos % size;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pieceBtn";
        btn.style.width  = pw + "px";
        btn.style.height = ph + "px";
        btn.style.left = (c*pw) + "px";
        btn.style.top  = (r*ph) + "px";

        const srcR = Math.floor(pieceIndex / size);
        const srcC = pieceIndex % size;

        btn.style.backgroundImage = `url('${FOTO_PUZZLE}')`;
        btn.style.backgroundSize  = `${size*100}% ${size*100}%`;
        btn.style.backgroundPosition = `${(srcC/(size-1))*100}% ${(srcR/(size-1))*100}%`;

        if(selected === pos){
          btn.style.outline = "3px solid rgba(255,77,166,.55)";
          btn.style.boxShadow = "0 16px 34px rgba(255,105,180,.24)";
        }

        btn.addEventListener("click", ()=>{
          if(selected === null){ selected = pos; renderPuzzle(); return; }
          if(selected === pos){ selected = null; renderPuzzle(); return; }

          const tmp = order[selected];
          order[selected] = order[pos];
          order[pos] = tmp;
          selected = null;
          moves += 1;
          $("moves").textContent = moves;

          if(isSolved()){
            $("pState").textContent = "✓";
            $("go2").disabled = false;
            popConfetti();
          }else{
            $("pState").textContent = " ";
          }
          renderPuzzle();
        });

        puzzleEl.appendChild(btn);
      }
    }

    function shuffle(){
      order = Array.from({length:size*size}, (_,i)=>i);
      for(let i=order.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [order[i],order[j]] = [order[j],order[i]];
      }
      if(isSolved()){ [order[0],order[1]] = [order[1],order[0]]; }
      selected = null;
      moves = 0;
      $("moves").textContent = moves;
      $("pState").textContent = " ";
      $("go2").disabled = true;
      renderPuzzle();
    }

    $("shuffle").addEventListener("click", shuffle);

    (function loadPuzzleImage(){
      const img = new Image();
      img.onload = ()=> shuffle();
      img.onerror = ()=>{
        $("pWarn").style.display = "block";
        $("pWarn").textContent = " ";
        order = Array.from({length:size*size}, (_,i)=>i);
        renderPuzzle();
      };
      img.src = FOTO_PUZZLE;
    })();

    $("go2").addEventListener("click", ()=> show("s2"));
    $("back1").addEventListener("click", ()=> show("s1"));

    /* ===== MEMORY ===== */
    const emojis = ["💗","💗","✨","✨","🌙","🌙","🍓","🍓","🧸","🧸","🌹","🌹"];
    let mDeck = [];
    let mFirst = null;
    let mLock = false;
    let mMatched = 0;
    let mTries = 0;

    $("mTotal").textContent = (emojis.length/2).toString();

    function shuffleArr(a){
      const b = a.slice();
      for(let i=b.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [b[i],b[j]] = [b[j],b[i]];
      }
      return b;
    }

    function renderMemory(){
      const wrap = $("memory");
      wrap.innerHTML = "";
      mDeck.forEach((card, idx)=>{
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cardBtn";
        btn.textContent = card.revealed || card.matched ? card.value : "♡";
        if(card.revealed) btn.classList.add("revealed");
        if(card.matched) btn.classList.add("matched");

        btn.addEventListener("click", ()=>{
          if(mLock) return;
          if(card.matched || card.revealed) return;

          card.revealed = true;
          renderMemory();

          if(mFirst === null){ mFirst = idx; return; }

          mTries += 1;
          $("mTries").textContent = mTries.toString();

          const a = mDeck[mFirst];
          const b = mDeck[idx];

          if(a.value === b.value){
            a.matched = true;
            b.matched = true;
            mMatched += 1;
            $("mPairs").textContent = mMatched.toString();
            $("mMsg").textContent = "💗";
            mFirst = null;
            renderMemory();

            if(mMatched === emojis.length/2){
              $("mMsg").textContent = "✓";
              $("go3").disabled = false;
              popConfetti();
            }
            return;
          }

          mLock = true;
          setTimeout(()=>{
            a.revealed = false;
            b.revealed = false;
            mFirst = null;
            mLock = false;
            renderMemory();
          }, 650);
        });

        wrap.appendChild(btn);
      });
    }

    function resetMemory(){
      mDeck = shuffleArr(emojis).map(v=>({value:v, revealed:false, matched:false}));
      mFirst = null;
      mLock = false;
      mMatched = 0;
      mTries = 0;
      $("mPairs").textContent = "0";
      $("mTries").textContent = "0";
      $("mMsg").textContent = "💗";
      $("go3").disabled = true;
      renderMemory();
    }

    $("resetMemory").addEventListener("click", resetMemory);
    resetMemory();

    $("go3").addEventListener("click", ()=> show("s3"));
    $("back2").addEventListener("click", ()=> show("s2"));

    /* ===== CATCH ===== */
    let cScore = 0;
    let cRunning = false;
    let cTimer = null;
    let cEndAt = 0;

    function updateCatchTime(){
      const left = Math.max(0, Math.ceil((cEndAt - Date.now())/1000));
      $("cTime").textContent = left + "s";
      if(left <= 0) stopCatch(false);
    }

    function spawnHeart(){
      if(!cRunning) return;
      const box = $("catchBox");
      const h = document.createElement("div");
      h.className = "heart";
      h.textContent = Math.random() < 0.15 ? "💘" : "💗";
      const x = 10 + Math.random()*80;
      const y = 80 + Math.random()*15;
      h.style.left = x + "%";
      h.style.top  = y + "%";
      const dur = 1.6 + Math.random()*1.4;
      h.style.animationDuration = dur + "s";

      h.addEventListener("click", ()=>{
        if(!cRunning) return;
        cScore += (h.textContent === "💘") ? 2 : 1;
        $("cScore").textContent = Math.min(10, cScore).toString();
        h.remove();
        if(cScore >= 10) stopCatch(true);
      });

      box.appendChild(h);
      setTimeout(()=>h.remove(), (dur*1000)+200);
      setTimeout(spawnHeart, 320 + Math.random()*380);
    }

    function startCatch(){
      if(cRunning) return;
      cRunning = true;
      cScore = 0;
      $("cScore").textContent = "0";
      $("go4").disabled = true;
      $("cMsg").textContent = "💗";
      $("catchBox").innerHTML = "";
      cEndAt = Date.now() + 20000;
      updateCatchTime();
      cTimer = setInterval(updateCatchTime, 250);
      spawnHeart();
    }

    function stopCatch(win){
      if(!cRunning) return;
      cRunning = false;
      clearInterval(cTimer);
      cTimer = null;

      if(win){
        $("cTime").textContent = "0s";
        $("cMsg").textContent = "✓";
        $("go4").disabled = false;
        popConfetti();
      }else{
        $("cMsg").textContent = "💗";
        $("go4").disabled = true;
      }
    }

    $("startCatch").addEventListener("click", startCatch);
    $("go4").addEventListener("click", ()=> show("s4"));
    $("back3").addEventListener("click", ()=> show("s3"));

    /* ===== QUIZ ===== */
    const quiz = [
      { id:1, text:"¿Cuál es mi color favorito?", opts:[["Rojo","rojo"],["Azul","azul"],["Negro","negro"]] },
      { id:2, text:"¿Qué es lo que más me gusta hacer?", opts:[["Jugar","jugar"],["Programar","programar"],["Las dos","lasdos"]] },
      { id:3, text:"¿Cuántos meses llevamos conociéndonos? (aprox.)", opts:[["6","6"],["7","7"],["8","8"]] }
    ];
    const correct = {1:"azul", 2:"lasdos", 3:"7"};
    let answered = {1:null,2:null,3:null};
    let score = 0;

    function renderQuiz(){
      $("q1").textContent = quiz[0].text;
      $("q2").textContent = quiz[1].text;
      $("q3").textContent = quiz[2].text;

      const blocks = [
        {wrap:$("q1opts"), q:1, opts:quiz[0].opts},
        {wrap:$("q2opts"), q:2, opts:quiz[1].opts},
        {wrap:$("q3opts"), q:3, opts:quiz[2].opts},
      ];

      blocks.forEach(({wrap,q,opts})=>{
        wrap.innerHTML = "";
        opts.forEach(([label,val])=>{
          const b = document.createElement("button");
          b.type="button";
          b.className = "ghost";
          b.textContent = label;
          b.style.padding = "10px 12px";
          b.style.borderRadius = "14px";
          b.style.fontSize = "13px";
          b.addEventListener("click", ()=>{
            if(answered[q] !== null) return;
            answered[q] = val;
            if(val === correct[q]){
              score += 1;
              b.classList.remove("ghost");
              b.classList.add("primary");
            }else{
              b.style.opacity = .7;
            }
            quizUpdate();
          });
          wrap.appendChild(b);
        });
      });
    }

    function quizUpdate(){
      const done = [1,2,3].filter(q => answered[q] !== null).length;
      $("qd").textContent = `${done}/3`;
      $("qs").textContent = `${score}`;
      $("go5").disabled = done !== 3;
      if(done === 3) $("quizMsg").textContent = "✓";
    }

    $("resetQuiz").addEventListener("click", ()=>{
      answered = {1:null,2:null,3:null};
      score = 0;
      $("quizMsg").textContent = "💗";
      renderQuiz();
      quizUpdate();
    });

    renderQuiz();
    quizUpdate();

    $("go5").addEventListener("click", ()=> show("s5"));

    /* ===== CONFETTI ===== */
    const confetti = $("confetti");
    function popConfetti(){
      confetti.innerHTML="";
      confetti.classList.add("show");
      const colors = ["#ff4da6","#ff85c8","#ffd36a","#ffffff","#ffc2e6"];
      const pieces = 140;
      for(let i=0;i<pieces;i++){
        const p = document.createElement("div");
        p.className = "piece";
        p.style.left = (Math.random()*100)+"vw";
        p.style.top  = (-10 - Math.random()*30) + "vh";
        p.style.width  = (6 + Math.random()*8) + "px";
        p.style.height = (10 + Math.random()*18) + "px";
        p.style.background = colors[Math.floor(Math.random()*colors.length)];
        p.style.animationDuration = (2.6 + Math.random()*1.8) + "s";
        p.style.animationDelay = (Math.random()*0.25) + "s";
        confetti.appendChild(p);
      }
      setTimeout(()=> confetti.classList.remove("show"), 4200);
    }

    /* ===== PIN -> PRESENTER ===== */
    const pinModal = $("pinModal");
    const pin = $("pin");
    const pinMsg = $("pinMsg");
    const audio = $("audio");

    $("pinTitle").textContent = "💗";
    $("pinSub").textContent = " ";

    function openPin(){
      pin.value = "";
      pinMsg.textContent = "";
      pinModal.classList.add("show");
      setTimeout(()=> pin.focus(), 60);
    }
    function closePin(){ pinModal.classList.remove("show"); }

    $("pinCancel").addEventListener("click", closePin);
    pinModal.addEventListener("click",(e)=>{ if(e.target===pinModal) closePin(); });

    $("finalContinue").addEventListener("click", openPin);

    $("pinUnlock").addEventListener("click", async ()=>{
      const v = (pin.value || "").trim();
      if(v !== PIN_REVELAR){
        pinMsg.textContent = " ";
        return;
      }

      try{
        audio.currentTime = 0;
        audio.volume = 0.68;
        await audio.play();
      }catch(e){}

      closePin();
      openPresenter();
    });

    /* ===== PRESENTER ===== */
    const presenter = $("presenter");
    const heartsFx = $("heartsFx");
    const wipe = $("wipe");
    const pHeadline = $("pHeadline");
    const pBody = $("pBody");
    const pPillLeft = $("pPillLeft");
    const pPillRight = $("pPillRight");

    const slides = [
      {
        head: `Hola, ${NOMBRE_DE_ELLA}`,
        body: `No sé en qué momento pasó...\npero me empecé a sentir más tranquilo cuando estás.\n\nMe gusta tu forma.\nMe gusta tu esencia.\nMe gusta tu presencia.`,
        pillL: "💗",
        pillR: "—"
      },
      {
        head: `Me quedo con`,
        body: `Tus detalles.\nTu voz.\nTu manera de ver el mundo.\n\nY esa sensación bonita de que...\ncontigo, todo es más suave.`,
        pillL: "✨",
        pillR: "—"
      },
      {
        head: `Quiero decirte`,
        body: `Que te elijo.\nSin prisa.\nSin ruido.\n\nPero con intención.\nCon cariño.\nCon verdad.`,
        pillL: "🌙",
        pillR: "—"
      },
      {
        head: `Entonces...`,
        body: `¿Quieres ser mi novia?`,
        pillL: "💘",
        pillR: "—"
      }
    ];

    let sIdx = 0;
    let typing = null;

    function clearTyping(){ if(typing){ clearInterval(typing); typing = null; } }

    function runWipe(){
      wipe.classList.remove("run");
      void wipe.offsetWidth;
      wipe.classList.add("run");
      setTimeout(()=> wipe.classList.remove("run"), 900);
    }

    function spawnHeartsBurst(){
      const symbols = ["💗","💘","✨","🌙","🌹","🧸"];
      const count = 22;
      for(let i=0;i<count;i++){
        const el = document.createElement("div");
        el.className = "hx";
        el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
        el.style.left = (Math.random()*100) + "vw";
        el.style.bottom = (-10 - Math.random()*20) + "px";
        el.style.fontSize = (16 + Math.random()*18) + "px";
        el.style.animationDuration = (2.8 + Math.random()*2.2) + "s";
        el.style.animationDelay = (Math.random()*0.2) + "s";
        heartsFx.appendChild(el);
        setTimeout(()=> el.remove(), 5200);
      }
    }

    function typeText(el, text, speed=70){
      clearTyping();
      el.textContent = "";
      el.classList.add("typeCursor");
      let i = 0;
      typing = setInterval(()=>{
        i++;
        el.textContent = text.slice(0,i);
        if(i >= text.length){
          clearTyping();
          el.classList.remove("typeCursor");
        }
      }, speed);
    }

    function renderSlide(index){
      sIdx = Math.max(0, Math.min(slides.length-1, index));
      const s = slides[sIdx];

      runWipe();
      spawnHeartsBurst();

      pPillLeft.textContent = s.pillL;
      pPillRight.textContent = s.pillR;

      pHeadline.textContent = s.head;
      typeText(pBody, s.body, 70);

      $("pPrev").disabled = sIdx === 0;
      $("pNext").textContent = (sIdx === slides.length-1) ? "Listo" : "▶";
    }

    function openPresenter(){
      presenter.classList.add("show");
      presenter.setAttribute("aria-hidden","false");
      popConfetti();
      renderSlide(0);
    }

    function closePresenter(){
      presenter.classList.remove("show");
      presenter.setAttribute("aria-hidden","true");
      clearTyping();
      heartsFx.innerHTML = "";
      showProposalToast();
    }

    $("pPrev").addEventListener("click", ()=> renderSlide(sIdx-1));
    $("pNext").addEventListener("click", ()=>{
      if(sIdx === slides.length-1) closePresenter();
      else renderSlide(sIdx+1);
    });
    $("pExit").addEventListener("click", ()=>{
      presenter.classList.remove("show");
      presenter.setAttribute("aria-hidden","true");
      clearTyping();
      heartsFx.innerHTML = "";
    });

    let touchX = null;
    presenter.addEventListener("touchstart",(e)=>{ touchX = e.touches?.[0]?.clientX ?? null; }, {passive:true});
    presenter.addEventListener("touchend",(e)=>{
      if(touchX === null) return;
      const endX = e.changedTouches?.[0]?.clientX ?? touchX;
      const dx = endX - touchX;
      touchX = null;
      if(Math.abs(dx) < 40) return;
      if(dx < 0) $("pNext").click();
      if(dx > 0) $("pPrev").click();
    });

    /* ===== Toast proposal ===== */
    const toast = $("toast");
    function showProposalToast(){
      $("toastTitle").textContent = NOMBRE_DE_ELLA + " 💗";
      $("toastBody").textContent = "¿Quieres ser mi novia?";
      $("btnNo").textContent = "No";
      $("btnYes").textContent = "Sí";
      $("btnNo").onclick = onNo;
      $("btnYes").onclick = onYes;
      toast.classList.add("show");
      popConfetti();
    }

    $("toastClose").addEventListener("click", ()=> toast.classList.remove("show"));

    function onYes(){
      toast.classList.remove("show");
      popConfetti();
      openResult("💗", `Entonces queda oficial.\n\n— ${TU_NOMBRE}`);
    }

    function onNo(){
      popConfetti();
      $("toastBody").textContent = "¿Segura? 💗";
      $("btnNo").textContent = "Segura";
      $("btnYes").textContent = "No segura";
      $("btnNo").onclick = ()=> {
        toast.classList.remove("show");
        openResult("💗", `Te entiendo.\n\nIgual quería decírtelo bonito.\n\n— ${TU_NOMBRE}`);
      };
      $("btnYes").onclick = ()=> {
        toast.classList.remove("show");
        popConfetti();
        openResult("💗", `Entonces sí 💗\n\n— ${TU_NOMBRE}`);
      };
    }

    /* ===== Result modal ===== */
    const res = $("resultModal");
    $("closeRes").addEventListener("click", ()=> res.classList.remove("show"));
    res.addEventListener("click", (e)=>{ if(e.target===res) res.classList.remove("show"); });

    function openResult(title, body){
      $("resTitle").textContent = title;
      $("resBody").textContent = body;
      res.classList.add("show");
    }
  </script>
</body>
</html>
